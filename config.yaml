agent:
  llm:
    provider: openai        # OpenAI-compatible server
    model: gpt-4o-mini
    base_url: null          # vLLM: http://localhost:8000/v1 | llama.cpp: http://localhost:8080/v1
  system_prompt: "Your task is to answer user questions based on the provided context."

logging:
  level: INFO
  file: agent.log
  format: "%(asctime)s %(levelname)s:%(name)s:%(message)s"

embedding:
  model: text-embedding-3-small
  base_url: null          # set for on-premises OpenAI-compatible servers, e.g. http://localhost:8000/v1

rag:
  debug_retrieval: true   # set to true to log query + retrieved chunks at INFO level
  reranker_model: BAAI/bge-reranker-base   # cross-encoder model for reranking retrieved chunks

evaluator:
  enabled: true    # set to false to disable RAG evaluation via RAGAS and Langfuse
                   # requires LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY in .env
